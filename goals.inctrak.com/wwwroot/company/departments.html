<div class="page-header">
    <button id="id_busy_btn" ng-class="busyBtn" disabled>
        <span ng-class="working"></span>Department {{busyStatus}}
    </button>
    &nbsp;<a href="#/">Home</a>&nbsp;<a ng-repeat="b in breadCrumbs" ng-href="/{{b.url}}">{{b.name}}</a>&nbsp;
</div>
<p class="lead">
    <div class="table-responsive" ng-show="showDepartments">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Current Goals</th>
                    <th>Total Goals</th>
                </tr>
            </thead>
            <tr ng-repeat="d in listItems">
                <td><a href="javascript:void(0)" ng-click="loadDepartment(d.DEPARTMENT_PK)">{{d.NAME}}</a></td>
                <td>{{d.CURRENT_GOALS| number}}</td>
                <td>{{d.TOTAL_GOALS| number}}</td>
            </tr>
        </table>
    </div>
</p>
<form class="form-horizontal" ng-show="showDepartment" ng-submit="processForm()">
    <h3>Department</h3>
    <div class="form-group">
        <label for="inputName">Name</label>
        <input type="text" class="form-control" id="inputName" placeholder="Enter the Department Name" ng-model="data.Department.NAME">
    </div>
    <button type="submit" class="btn btn-default">Submit</button>
    <a href="javascript:void(0)" ng-click="removeDepartment(data.Department.DEPARTMENT_PK)">Remove</a>
</form>
<div class="form-horizontal" ng-include="dialogTemplate" />
