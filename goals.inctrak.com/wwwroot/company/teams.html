<div class="page-header">
    <button id="id_busy_btn" ng-class="busyBtn" disabled>
        <span ng-class="working"></span>Teams {{busyStatus}}
    </button>
    &nbsp;<a href="#/">Home</a>&nbsp;<a ng-repeat="b in breadCrumbs" ng-href="/{{b.url}}">{{b.name}}</a>&nbsp;
</div>
<p class="lead">
    <div class="table-responsive" ng-show="showTeams">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Current Goals</th>
                    <th>Total Goals</th>
                </tr>
            </thead>
            <tr ng-repeat="team in listItems">
                <td><a href="javascript:void(0)" ng-click="loadTeam(team.TEAM_PK)">{{team.NAME}}</a></td>
                <td>{{team.DEPARTMENT_NAME}}</td>
                <td>{{team.CURRENT_GOALS| number}}</td>
                <td>{{team.TOTAL_GOALS| number}}</td>
            </tr>
        </table>
    </div>
</p>

<form class="form-horizontal" ng-show="showTeam" ng-submit="processForm()">
    <h3>Team</h3>
    <div class="form-group">
        <label for="inputName">Name</label>
        <input type="text" class="form-control" id="inputName" placeholder="Enter the Team Name" ng-model="data.Team.NAME">
    </div>
    <div class="form-group">
        <label for="departmentId">Department</label>
        <select class="form-control" ng-model="data.Team.DEPARTMENT_FK" id="departmentId">
            <option ng-repeat="sc in data.Departments" ng-selected="{{data.Team.DEPARTMENT_FK == sc.DEPARTMENT_PK}}" value="{{sc.DEPARTMENT_PK}}">{{sc.NAME}}</option>
        </select>
    </div>
    <button type="submit" class="btn btn-default">Submit</button>
    <a href="javascript:void(0)" ng-click="removeTeam(data.Team.TEAM_PK)">Remove</a>
</form>

<div class="form-horizontal" ng-include="dialogTemplate" />
