<div class="page-header">
    <button id="id_busy_btn" ng-class="busyBtn" disabled>
        <span ng-class="working"></span>Plans {{busyStatus}}
    </button>
    &nbsp;<a href="#/">Home</a>&nbsp;<a ng-repeat="b in breadCrumbs" ng-href="/{{b.url}}">{{b.name}}</a>&nbsp;
</div>
<p class="lead">
    <div class="table-responsive" ng-show="showPlans">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Stock Class</th>
                    <th>Total Shares</th>
                    <th>Shares Granted</th>
                </tr>
            </thead>
            <tr ng-repeat="plan in listItems">
                <td><a href="javascript:void(0)" ng-click="loadPlan(plan.PLAN_PK)">{{plan.NAME}}</a></td>
                <td>{{plan.STOCK_CLASS_NAME}}</td>
                <td>{{plan.TOTAL_SHARES}}</td>
                <td>{{plan.GRANTED_SHARES}}</td>
            </tr>
        </table>
    </div>
</p>

<form class="form-horizontal" ng-show="showPlan" ng-submit="processForm()">
    <h3>Plan</h3>
    <div class="form-group">
        <label for="inputName">Name</label>
        <input type="text" class="form-control" id="inputName" placeholder="Enter the Plan Name" ng-model="data.Plan.NAME">
    </div>
    <div class="form-group">
        <label for="stockClassId">Stock Class</label>
        <select class="form-control" ng-model="data.Plan.STOCK_CLASS_FK" id="stockClassId">
            <option ng-repeat="sc in data.StockClasses" ng-selected="{{data.Plan.STOCK_CLASS_FK == sc.STOCK_CLASS_PK}}" value="{{sc.STOCK_CLASS_PK}}">{{sc.NAME}}</option>
        </select>
    </div>
    <div class="form-group">
        <label for="inputShares">Total Shares Allocated</label>
        <input type="number" class="form-control" id="inputShares" placeholder="Enter the total amount of shares allocated to this Plan" ng-model="data.Plan.TOTAL_SHARES">
    </div>
    <button type="submit" class="btn btn-default">Submit</button>
    <a href="javascript:void(0)" ng-click="removePlan(data.Plan.PLAN_PK)">Remove</a>
</form>

<div class="form-horizontal" ng-include="dialogTemplate" />
