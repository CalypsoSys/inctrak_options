<div class="page-header">
    <button id="id_busy_btn" ng-class="busyBtn" disabled>
        <span ng-class="working"></span>Reset Password {{busyStatus}}
    </button>
</div>

<form ng-submit="processForm()">
    <h3>Reset Password</h3>
    <div class="form-group">
        <label for="inputName">User Name/Email Address</label>
        <input type="text" class="form-control" id="inputName" placeholder="Enter Username or email address" ng-model="userNameEmail">
    </div>
    <button type="submit" class="btn btn-default">Submit</button>
</form>

<div class="form-horizontal" ng-include="dialogTemplate" />
