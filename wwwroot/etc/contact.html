<div class="page-header">
    <button ng-class="busyBtn" disabled>
        <span ng-class="working"></span> Contact {{busyStatus}}
    </button>
</div>

<form ng-submit="processForm()">
    <div class="form-group">
        <label for="inputEmail">Email address</label>
        <input type="email" class="form-control" id="inputEmail" placeholder="Enter email" ng-model="formData.EmailAddress">
    </div>
    <div class="form-group">
        <label for="inputName">Name</label>
        <input type="text" class="form-control" id="inputName" placeholder="Enter Name" ng-model="formData.Name">
    </div>
    <div class="form-group">
        <label for="inputCategory">Category</label>
        <select ng-model="formData.MessageTypeFk" class="form-control" id="inputCategory">
            <option ng-selected="{{data.Key == formData.MessageTypeFk}}"
                    ng-repeat="data in messageTypes"
                    value="{{data.Key}}">
                {{data.Name}}
            </option>
        </select>
    </div>
    <div class="form-group">
        <label for="inputSubject">Subject</label>
        <input type="text" class="form-control" id="inputSubject" placeholder="Enter Subject" ng-model="formData.Subject">
    </div>
    <div class="form-group">
        <label for="inputMessage">Message</label>
        <textarea id="inputMessage" class="form-control" rows="10" ng-model="formData.Message"></textarea>
    </div>
    <button type="submit" class="btn btn-default">Submit</button>
    Or email us at <a href="mailto:contact@inctrak.com">contact@inctrak.com</a>
</form>

<div class="form-horizontal" ng-include="dialogTemplate" />
