<div class="page-header">
    <button id="id_busy_btn" ng-class="busyBtn" disabled>
        <span ng-class="working"></span>Termination Date {{busyStatus}}
    </button>
    &nbsp;<a href="#/">Home</a>&nbsp;<a ng-repeat="b in breadCrumbs" ng-href="/{{b.url}}">{{b.name}}</a>&nbsp;
</div>
<p class="lead">
    <div class="table-responsive" ng-show="showTerminations">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                </tr>
            </thead>
            <tr ng-repeat="termination in listItems">
                <td><a href="javascript:void(0)" ng-click="loadTermination(termination.TERMINATION_PK)">{{termination.NAME}}</a></td>
            </tr>
        </table>
    </div>
</p>

<form class="form-horizontal" ng-show="showTermination" ng-submit="processForm()">
    <h3>Termination Date</h3>
    <div class="form-group">
        <label for="inputName">Name</label>
        <input type="text" class="form-control" id="inputName" placeholder="Enter the Termination Name" ng-model="data.Termination.NAME">
    </div>
    <div class="row">
        <div class="col-sm-2">
            <label for="isAbsoluteDate">Is Absolute Date</label>
            <input id="isAbsoluteDate" type="checkbox" ng-checked="{{data.Termination.IS_ABSOLUTE}}" ng-model="data.Termination.IS_ABSOLUTE" />
        </div>
        <div class="col-sm-2" ng-show="data.Termination.IS_ABSOLUTE">
            <input type="date" class="form-control" ng-model="data.Termination.ABSOLUTE_DATE">
        </div>
    </div>
    <div class="row" ng-hide="data.Termination.IS_ABSOLUTE">
        <div class="col-sm-2">
            <label for="termFromId">Terminate from </label>
            <select class="form-control" ng-model="data.Termination.TERM_FROM_FK" id="termFromId">
                <option ng-repeat="tf in data.TermFromType" ng-selected="{{data.Termination.TERM_FROM_FK == tf.TERM_FROM_PK}}" value="{{tf.TERM_FROM_PK}}">{{tf.NAME}}</option>
            </select>
        </div>
        <div class="col-sm-2" ng-show="isSpecificDate()">
            <label for="specDateId"> </label>
            <input type="date" id="specDateId" class="form-control" ng-model="data.Termination.SPECIFIC_DATE">
        </div>
        <div class="col-sm-2">
            <label for="yearsId"> in Years </label>
            <input type="number" class="form-control" id="yearsId" placeholder="Enter the years" ng-model="data.Termination.YEARS">
        </div>
        <div class="col-sm-2">
            <label for="monthsId"> months </label>
            <input type="number" class="form-control" id="monthsId" placeholder="Enter the months" ng-model="data.Termination.MONTHS">
        </div>
        <div class="col-sm-2">
            <label for="daysId"> days </label>
            <input type="number" class="form-control" id="daysId" placeholder="Enter the days" ng-model="data.Termination.DAYS">
        </div>    
    </div>
    <br />
    <div class="form-group">
        <button type="submit" class="btn btn-default">Submit</button>
        <a href="javascript:void(0)" ng-click="removeTermination(data.Termination.TERMINATION_PK)">Remove</a>
    </div>
</form>

<div class="form-horizontal" ng-include="dialogTemplate" />
