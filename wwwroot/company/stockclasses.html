<div class="page-header">
    <button id="id_busy_btn" ng-class="busyBtn" disabled>
        <span ng-class="working"></span>Stock Classes {{busyStatus}}
    </button>
    &nbsp;<a href="#/">Home</a>&nbsp;<a ng-repeat="b in breadCrumbs" ng-href="/{{b.url}}">{{b.name}}</a>&nbsp;
</div>
<p class="lead">
    <div class="table-responsive" ng-show="showStockClasses">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Total Shares</th>
                </tr>
            </thead>
            <tr ng-repeat="sc in listItems">
                <td><a href="javascript:void(0)" ng-click="loadStockClass(sc.STOCK_CLASS_PK)">{{sc.NAME}}</a></td>
                <td>{{sc.TOTAL_SHARES}}</td>
            </tr>
        </table>
    </div>
</p>

<form class="form-horizontal" ng-show="showStockClass" ng-submit="processForm()">
    <h3>Stock Class</h3>
    <div class="form-group">
        <label for="inputName">Name</label>
        <input type="text" class="form-control" id="inputName" placeholder="Enter the Stock Class Name" ng-model="data.StockClass.NAME">
    </div>
    <div class="form-group">
        <label for="inputShares">Total Shares Allocated</label>
        <input type="number" class="form-control" id="inputShares" placeholder="Enter the total amount of shares in this Stock Class" ng-model="data.StockClass.TOTAL_SHARES">
    </div>
    <button type="submit" class="btn btn-default">Submit</button>
    <a href="javascript:void(0)" ng-click="removeStockClass(data.StockClass.STOCK_CLASS_PK)">Remove</a>
</form>

<div class="form-horizontal" ng-include="dialogTemplate" />
