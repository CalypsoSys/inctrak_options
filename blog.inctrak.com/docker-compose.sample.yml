version: "3"

services:
   db_node_inctrak_wp:
     image: mysql:5.7
     volumes:
        - db_data:/var/lib/mysql
     restart: always
     environment:
        MYSQL_ROOT_PASSWORD: <- your password here ->
        MYSQL_DATABASE: wordpress
        MYSQL_USER: wordpress
        MYSQL_PASSWORD: <- your password here ->
     container_name: inctrak_wp_db

   wordpress:
     depends_on:
        - db_node_inctrak_wp
     image: wordpress:latest
     expose:
        - 80
     restart: always
     volumes:
       - ./wp-content:/var/www/html/wp-content
       - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
     environment:
        VIRTUAL_HOST: blog.<- your domain here ->
        LETSENCRYPT_HOST: blog.<- your domain here ->
        LETSENCRYPT_EMAIL: <- your email here ->
        WORDPRESS_DB_HOST: db_node_inctrak_wp:3306
        WORDPRESS_DB_USER: wordpress
        WORDPRESS_DB_PASSWORD: <- your password here ->
     container_name: inctrak_wp
volumes:
  db_data:

networks:
  default:
    external:
      name: nginx-proxy

